    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Deep Dark Blue/Slate */
            color: #f1f5f9;
            scroll-behavior: smooth;
        }

        /* Glassmorphism Navigation */
        .glass-nav { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-link-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        
        /* Glassy Category Folders */
        .glass-folder { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            position: relative; 
            overflow: hidden;
        }
        .glass-folder:hover { 
            transform: translateY(-6px); 
            border-color: rgba(59, 130, 246, 0.5); 
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .hidden-access { display: none !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
        .shake-error {
            animation: shake 0.4s ease-in-out;
            border-color: #ef4444 !important;
        }

        .free-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #3b82f6;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 9999px;
            z-index: 10;
        }

        .recent-scroll-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            padding: 20px 0;
        }

        .recent-scroll-track {
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            width: max-content;
            animation: scroll-horizontal 40s linear infinite;
        }

        .recent-scroll-viewport:hover .recent-scroll-track {
            animation-play-state: paused;
        }

        @keyframes scroll-horizontal {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }

        .lesson-card-horizontal {
            width: 320px;
            flex-shrink: 0;
        }

        #mobile-menu-dropdown {
            display: none;
            background: #1e293b;
            border: 1px solid #334155;
            transform-origin: top right;
            animation: scaleIn 0.2s ease-out;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === AUTH_CONFIG.user && p === AUTH_CONFIG.pass) {
                sessionStorage.setItem('isAuthorized', 'true');
                unlockPortal();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                document.getElementById('login-card').classList.add('shake-error');
                setTimeout(() => { document.getElementById('login-card').classList.remove('shake-error'); }, 400);
            }
        }

        function unlockPortal() {
            document.getElementById('login-screen').classList.add('hidden-access');
            document.getElementById('app-content').classList.remove('hidden-access');
            renderPage();
        }

        function logout() {
            sessionStorage.removeItem('isAuthorized');
            location.reload();
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu-dropdown');
            const isVisible = menu.style.display === 'block';
            menu.style.display = isVisible ? 'none' : 'block';
        }

        function navigateTo(page, folder = null) {
            activePage = page;
            currentFolder = folder;
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-link-active'));
            const activeBtn = document.getElementById(`nav-${page}`);
            if (activeBtn) activeBtn.classList.add('nav-link-active');
            renderPage();
            window.scrollTo(0, 0);
        }

        // GOOGLE FORM SUBMISSION HANDLER
        function submitQuestion(e) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button');
            const originalText = btn.innerHTML;
            
            const name = form.querySelector('[name="name"]').value;
            const email = form.querySelector('[name="email"]').value;
            const question = form.querySelector('[name="question"]').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending...';

            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSedXLY7YThoCDhZwzVwAhH3PHB9OwpS_3FEZaGCGg09Xy_cfQ/formResponse";
            
            const formData = new FormData();
            formData.append("entry.604498104", name);     // Name field
            formData.append("entry.2073441562", email);    // Email field
            formData.append("entry.1815026184", question); // Question field

            fetch(formUrl, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> Submitted Successfully!';
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                form.reset();
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                }, 4000);
            }).catch(err => {
                console.error(err);
                btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error Sending';
                btn.disabled = false;
                setTimeout(() => { btn.innerHTML = originalText; }, 3000);
            });
        }
